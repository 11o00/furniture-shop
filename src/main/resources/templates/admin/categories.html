<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('categories')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">分类管理</h4>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                        <i class="bi bi-plus-lg"></i> 添加分类
                    </button>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div th:if="${categories.isEmpty()}" class="text-center text-muted py-5">暂无分类</div>
                        <div th:if="${!categories.isEmpty()}" class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="table-light">
                                    <tr><th>ID</th><th>名称</th><th>描述</th><th>操作</th></tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cat : ${categories}">
                                        <td th:text="${cat.id}"></td>
                                        <td th:text="${cat.name}"></td>
                                        <td th:text="${cat.description}"></td>
                                        <td>
                                            <form th:action="@{/admin/categories/{id}/delete(id=${cat.id})}" method="post" class="d-inline">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定删除？')">删除</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/categories}" method="post" th:object="${category}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="modal-header">
                        <h5 class="modal-title">添加分类</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">分类名称</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
