<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('users')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header mb-4"><h4 class="mb-0">用户管理</h4></div>
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white fw-bold">买家列表</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="table-light">
                                    <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>手机</th><th>状态</th><th>操作</th></tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user : ${buyers}">
                                        <td th:text="${user.id}"></td>
                                        <td th:text="${user.username}"></td>
                                        <td th:text="${user.email}"></td>
                                        <td th:text="${user.phone}"></td>
                                        <td><span class="badge" th:classappend="${user.enabled} ? 'bg-success' : 'bg-secondary'" th:text="${user.enabled} ? '正常' : '禁用'"></span></td>
                                        <td>
                                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'btn-outline-danger' : 'btn-outline-success'" th:text="${user.enabled} ? '禁用' : '启用'"></button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${buyers.isEmpty()}"><td colspan="6" class="text-center text-muted py-4">暂无买家</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="card shadow-sm">
                    <div class="card-header bg-white fw-bold">卖家列表</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="table-light">
                                    <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>手机</th><th>状态</th><th>操作</th></tr>
                                </thead>
                                <tbody>
                                    <tr th:each="user : ${sellers}">
                                        <td th:text="${user.id}"></td>
                                        <td th:text="${user.username}"></td>
                                        <td th:text="${user.email}"></td>
                                        <td th:text="${user.phone}"></td>
                                        <td><span class="badge" th:classappend="${user.enabled} ? 'bg-success' : 'bg-secondary'" th:text="${user.enabled} ? '正常' : '禁用'"></span></td>
                                        <td>
                                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'btn-outline-danger' : 'btn-outline-success'" th:text="${user.enabled} ? '禁用' : '启用'"></button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${sellers.isEmpty()}"><td colspan="6" class="text-center text-muted py-4">暂无卖家</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
