<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮播图管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('banners')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">轮播图管理</h4>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addBannerModal">
                        <i class="bi bi-plus-lg"></i> 添加轮播图
                    </button>
                </div>
                <div th:if="${banners.isEmpty()}" class="text-center text-muted py-5">暂无轮播图</div>
                <div th:if="${!banners.isEmpty()}" class="row g-3">
                    <div class="col-md-6" th:each="banner : ${banners}">
                        <div class="card shadow-sm h-100">
                            <div class="card-body">
                                <img th:src="${banner.imageUrl}" th:alt="${banner.title}" class="admin-banner-preview mb-3"
                                     onerror="this.src='/images/banner1.jpg'">
                                <h6 th:text="${banner.title}"></h6>
                                <p class="text-muted small mb-2" th:text="${banner.linkUrl}"></p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="badge" th:classappend="${banner.active} ? 'bg-success' : 'bg-secondary'" th:text="${banner.active} ? '启用' : '禁用'"></span>
                                    <form th:action="@{/admin/banners/{id}/delete(id=${banner.id})}" method="post">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="addBannerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/banners}" method="post" th:object="${banner}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="modal-header">
                        <h5 class="modal-title">添加轮播图</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">标题</label>
                            <input type="text" th:field="*{title}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">图片URL</label>
                            <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="/images/banner1.jpg" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">链接地址</label>
                            <input type="text" th:field="*{linkUrl}" class="form-control" placeholder="/products">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">排序</label>
                            <input type="number" th:field="*{sortOrder}" class="form-control" value="0">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{active}" id="bannerActive" checked>
                            <label class="form-check-label" for="bannerActive">启用</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
