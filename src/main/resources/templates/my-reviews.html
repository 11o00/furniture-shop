<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的评价 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">个人中心</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/profile}" class="list-group-item list-group-item-action">个人信息</a>
                        <a th:href="@{/profile/addresses}" class="list-group-item list-group-item-action">收货地址</a>
                        <a th:href="@{/profile/favorites}" class="list-group-item list-group-item-action">我的收藏</a>
                        <a th:href="@{/profile/reviews}" class="list-group-item list-group-item-action active">我的评价</a>
                        <a th:href="@{/order/my-orders}" class="list-group-item list-group-item-action">我的订单</a>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">我的评价</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${reviews.isEmpty()}">
                            <div class="text-center py-5">
                                <i class="bi bi-chat-left-text display-1 text-muted"></i>
                                <p class="mt-3 text-muted">暂无评价</p>
                            </div>
                        </div>
                        
                        <div th:if="${!reviews.isEmpty()}" class="list-group list-group-flush">
                            <div class="list-group-item px-0" th:each="review : ${reviews}">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <div>
                                        <strong th:text="${review.product.name}"></strong>
                                        <div class="text-warning mt-1">
                                            <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, review.rating)}"></i>
                                        </div>
                                    </div>
                                    <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                                </div>
                                <p class="mb-0 text-muted" th:text="${review.comment}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
