<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('dashboard')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header mb-4">
                    <h4 class="mb-0">控制台概览</h4>
                </div>
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="card admin-stat-card border-0">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2">今日订单数</h6>
                                    <h2 class="mb-0" th:text="${todayOrderCount}">0</h2>
                                </div>
                                <i class="bi bi-cart-check text-primary fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card admin-stat-card border-0">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2">今日销售额</h6>
                                    <h2 class="mb-0 text-danger">¥<span th:text="${#numbers.formatDecimal(todayAmount, 1, 2)}">0</span></h2>
                                </div>
                                <i class="bi bi-currency-dollar text-success fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card admin-stat-card border-0">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2">待处理订单</h6>
                                    <h2 class="mb-0" th:text="${pendingOrderCount}">0</h2>
                                </div>
                                <i class="bi bi-clock-history text-warning fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card admin-stat-card border-0">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2">低库存商品</h6>
                                    <h2 class="mb-0" th:text="${lowStockCount}">0</h2>
                                </div>
                                <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card admin-stat-card border-0">
                            <div class="card-body d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="text-muted mb-2">7天新用户</h6>
                                    <h2 class="mb-0" th:text="${newUserCount}">0</h2>
                                </div>
                                <i class="bi bi-person-plus text-info fs-1"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card shadow-sm">
                    <div class="card-header bg-white"><h5 class="mb-0">功能入口</h5></div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/users}" class="btn btn-outline-primary w-100 admin-quick-btn"><i class="bi bi-people fs-4"></i>用户管理</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/products}" class="btn btn-outline-success w-100 py-3"><i class="bi bi-box-seam d-block fs-4"></i>商品管理</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/categories}" class="btn btn-outline-warning w-100 py-3"><i class="bi bi-tags d-block fs-4"></i>分类管理</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/orders}" class="btn btn-outline-info w-100 py-3"><i class="bi bi-receipt d-block fs-4"></i>订单管理</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/banners}" class="btn btn-outline-danger w-100 py-3"><i class="bi bi-images d-block fs-4"></i>轮播图</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/reviews}" class="btn btn-outline-secondary w-100 py-3"><i class="bi bi-chat-square-text d-block fs-4"></i>评价管理</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/announcements}" class="btn btn-outline-dark w-100 py-3"><i class="bi bi-megaphone d-block fs-4"></i>公告管理</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/reports}" class="btn btn-outline-primary w-100 py-3"><i class="bi bi-bar-chart-line d-block fs-4"></i>数据报表</a>
                            </div>
                            <div class="col-md-4 col-6">
                                <a th:href="@{/admin/settings}" class="btn btn-outline-secondary w-100 py-3"><i class="bi bi-gear d-block fs-4"></i>系统设置</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
