<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">个人中心</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/profile}" class="list-group-item list-group-item-action">个人信息</a>
                        <a th:href="@{/profile/addresses}" class="list-group-item list-group-item-action">收货地址</a>
                        <a th:href="@{/profile/favorites}" class="list-group-item list-group-item-action active">我的收藏</a>
                        <a th:href="@{/profile/reviews}" class="list-group-item list-group-item-action">我的评价</a>
                        <a th:href="@{/order/my-orders}" class="list-group-item list-group-item-action">我的订单</a>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">我的收藏</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${favorites.isEmpty()}">
                            <div class="text-center py-5">
                                <i class="bi bi-heart display-1 text-muted"></i>
                                <p class="mt-3 text-muted">暂无收藏</p>
                                <a th:href="@{/products}" class="btn btn-primary">去购物</a>
                            </div>
                        </div>
                        
                        <div th:if="${!favorites.isEmpty()}" class="row g-4">
                            <div class="col-md-4 col-6" th:each="fav : ${favorites}">
                                <div class="card product-card h-100">
                                    <div th:replace="~{fragments/product-image :: card(product=${fav.product})}"></div>
                                    <div class="card-body">
                                        <h6 class="card-title text-truncate" th:text="${fav.product.name}"></h6>
                                        <p class="text-danger fw-bold mb-2" th:text="'¥' + ${fav.product.price}"></p>
                                        <div class="d-flex gap-2">
                                            <a th:href="@{/products/{id}(id=${fav.product.id})}" class="btn btn-sm btn-primary flex-grow-1">查看</a>
                                            <form th:action="@{/profile/favorites/{id}/remove(id=${fav.product.id})}" method="post">
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="bi bi-heartbreak"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
