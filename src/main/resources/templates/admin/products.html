<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('products')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header mb-4"><h4 class="mb-0">商品管理</h4></div>
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div th:if="${products.isEmpty()}" class="text-center text-muted py-5">暂无商品</div>
                        <div th:if="${!products.isEmpty()}" class="table-responsive">
                            <table class="table align-middle table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>商品</th>
                                        <th>价格</th>
                                        <th>库存</th>
                                        <th>销量</th>
                                        <th>卖家</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="product : ${products}">
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img th:src="${product.displayImage}" th:alt="${product.name}"
                                                     class="admin-table-thumb me-2"
                                                     onerror="this.src='/images/placeholder-product.svg'">
                                                <span th:text="${product.name}"></span>
                                            </div>
                                        </td>
                                        <td class="text-danger fw-bold" th:text="'¥' + ${product.price}"></td>
                                        <td th:text="${product.stock}"></td>
                                        <td th:text="${product.sales}"></td>
                                        <td th:text="${product.seller != null ? product.seller.username : '未知'}"></td>
                                        <td>
                                            <span class="badge" th:classappend="${product.status == 1} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${product.status == 1} ? '上架' : '下架'"></span>
                                        </td>
                                        <td>
                                            <form th:action="@{/admin/products/{id}/toggle(id=${product.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-sm"
                                                        th:classappend="${product.status == 1} ? 'btn-outline-danger' : 'btn-outline-success'"
                                                        th:text="${product.status == 1} ? '下架' : '上架'"></button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
