<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">购物车</h2>
        
        <div th:if="${cartItems.isEmpty()}">
            <div class="text-center py-5">
                <i class="bi bi-cart-x display-1 text-muted"></i>
                <p class="mt-3 text-muted">购物车是空的</p>
                <a th:href="@{/products}" class="btn btn-primary">去购物</a>
            </div>
        </div>
        
        <div th:if="${!cartItems.isEmpty()}">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>商品</th>
                                    <th>价格</th>
                                    <th>数量</th>
                                    <th>小计</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${cartItems}">
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="me-3" th:replace="~{fragments/product-image :: thumb(product=${item.product})}"></div>
                                            <a th:href="@{/products/{id}(id=${item.product.id})}" class="text-decoration-none text-dark" th:text="${item.product.name}"></a>
                                        </div>
                                    </td>
                                    <td class="text-danger fw-bold" th:text="'¥' + ${item.product.price}"></td>
                                    <td>
                                        <form th:action="@{/cart/update}" method="post" class="d-flex">
                                            <input type="hidden" name="cartId" th:value="${item.id}">
                                            <input type="number" name="quantity" class="form-control" style="width: 80px;" th:value="${item.quantity}" min="1" onchange="this.form.submit()">
                                        </form>
                                    </td>
                                    <td class="text-danger fw-bold" th:text="'¥' + ${item.product.price * item.quantity}"></td>
                                    <td>
                                        <form th:action="@{/cart/remove}" method="post">
                                            <input type="hidden" name="cartId" th:value="${item.id}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0">总计：</h5>
                        </div>
                        <div class="text-end">
                            <p class="fs-3 text-danger fw-bold mb-3" th:text="'¥' + ${total}"></p>
                            <a th:href="@{/order/checkout}" class="btn btn-primary btn-lg">
                                去结算 <i class="bi bi-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
