<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品编辑 - 卖家中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-3 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">卖家中心</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/seller}" class="list-group-item list-group-item-action">商品管理</a>
                        <a th:href="@{/seller/orders}" class="list-group-item list-group-item-action">订单管理</a>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0" th:text="${product.id == null} ? '添加商品' : '编辑商品'"></h5>
                    </div>
                    <div class="card-body">
                        <form th:action="${product.id == null} ? @{/seller/products} : @{/seller/products/{id}(id=${product.id})}"
                              th:object="${product}" method="post">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">商品名称</label>
                                <div class="col-sm-10">
                                    <input type="text" th:field="*{name}" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">商品分类</label>
                                <div class="col-sm-10">
                                    <select name="categoryId" class="form-select" required>
                                        <option value="">请选择分类</option>
                                        <option th:each="cat : ${categories}" 
                                                th:value="${cat.id}" 
                                                th:selected="${product.category != null and product.category.id == cat.id}"
                                                th:text="${cat.name}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">价格</label>
                                <div class="col-sm-10">
                                    <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">库存</label>
                                <div class="col-sm-10">
                                    <input type="number" th:field="*{stock}" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">材质</label>
                                <div class="col-sm-10">
                                    <input type="text" th:field="*{material}" class="form-control">
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">尺寸</label>
                                <div class="col-sm-10">
                                    <input type="text" th:field="*{size}" class="form-control">
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">风格</label>
                                <div class="col-sm-10">
                                    <input type="text" th:field="*{style}" class="form-control">
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">品牌</label>
                                <div class="col-sm-10">
                                    <input type="text" th:field="*{brand}" class="form-control">
                                </div>
                            </div>
                            
                            <div class="row mb-3">
                                <label class="col-sm-2 col-form-label">商品描述</label>
                                <div class="col-sm-10">
                                    <textarea th:field="*{description}" class="form-control" rows="5"></textarea>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-sm-10 offset-sm-2">
                                    <button type="submit" class="btn btn-primary">保存</button>
                                    <a th:href="@{/seller}" class="btn btn-outline-secondary ms-2">取消</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
