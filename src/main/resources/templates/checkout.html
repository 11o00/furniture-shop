<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">订单结算</h2>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">收货地址</h5>
                    </div>
                    <div class="card-body">
                        <div th:if="${addresses.isEmpty()}">
                            <p class="text-muted">请先添加收货地址</p>
                        </div>
                        <div th:if="${!addresses.isEmpty()}">
                            <div class="form-check" th:each="addr : ${addresses}">
                                <input class="form-check-input" type="radio" name="selectedAddress" th:id="${'addr' + addr.id}" th:checked="${addr.isDefault}">
                                <label class="form-check-label w-100" th:for="${'addr' + addr.id}">
                                    <strong th:text="${addr.name}"></strong>
                                    <span th:text="${addr.phone}"></span>
                                    <br>
                                    <span th:text="${addr.address}"></span>
                                    <span th:if="${addr.isDefault}" class="badge bg-primary ms-2">默认</span>
                                </label>
                            </div>
                        </div>
                        <a th:href="@{/profile/addresses}" class="btn btn-outline-primary mt-3">管理地址</a>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">订单商品</h5>
                    </div>
                    <div class="card-body">
                        <div class="list-group list-group-flush">
                            <div class="list-group-item d-flex align-items-center px-0" th:each="item : ${cartItems}">
                                <div class="me-3" th:replace="~{fragments/product-image :: thumb(product=${item.product})}"></div>
                                <div class="flex-grow-1">
                                    <h6 class="mb-0" th:text="${item.product.name}"></h6>
                                    <small class="text-muted">x<span th:text="${item.quantity}"></span></small>
                                </div>
                                <div class="text-danger fw-bold" th:text="'¥' + ${item.product.price * item.quantity}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card sticky-top" style="top: 20px;">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">订单汇总</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">收货人</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">联系电话</label>
                            <input type="text" id="phone" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">收货地址</label>
                            <textarea id="address" class="form-control" rows="3" required></textarea>
                        </div>
                        
                        <hr>
                        
                        <div class="d-flex justify-content-between mb-2">
                            <span>商品金额</span>
                            <span th:text="'¥' + ${total}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>运费</span>
                            <span>¥0</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <strong>应付金额</strong>
                            <strong class="text-danger fs-4" th:text="'¥' + ${total}"></strong>
                        </div>
                        
                        <form th:action="@{/order/create}" method="post" class="mt-4">
                            <input type="hidden" name="address" id="formAddress">
                            <input type="hidden" name="phone" id="formPhone">
                            <button type="submit" class="btn btn-primary btn-lg w-100" onclick="submitOrder()">提交订单</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function submitOrder() {
            document.getElementById('formAddress').value = document.getElementById('name').value + ' ' + document.getElementById('address').value;
            document.getElementById('formPhone').value = document.getElementById('phone').value;
        }
        
        const radios = document.querySelectorAll('input[name="selectedAddress"]');
        radios.forEach(radio => {
            radio.addEventListener('change', function() {
                const label = this.nextElementSibling;
                const name = label.querySelector('strong').textContent;
                const parts = label.textContent.split(' ');
                document.getElementById('name').value = name;
                document.getElementById('phone').value = parts[1];
                document.getElementById('address').value = label.textContent.split(name + ' ' + parts[1])[1].trim().split('默认')[0].trim();
            });
        });
        
        const defaultRadio = document.querySelector('input[name="selectedAddress"]:checked');
        if (defaultRadio) {
            defaultRadio.dispatchEvent(new Event('change'));
        }
    </script>
</body>
</html>
