<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('announcements')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">公告管理</h4>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#mockAnnounceModal">
                        <i class="bi bi-plus-lg"></i> 新建公告
                    </button>
                </div>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                <div class="row g-3">
                    <div class="col-md-6" th:each="a : ${announcements}">
                        <div class="card shadow-sm h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between mb-2">
                                    <h6 class="mb-0" th:text="${a.title}"></h6>
                                    <span class="badge" th:classappend="${a.badgeClass}" th:text="${a.statusLabel}"></span>
                                </div>
                                <p class="text-muted small mb-1">受众：<span th:text="${a.subtitle}"></span></p>
                                <p class="mb-2" th:text="${a.content}"></p>
                                <div class="d-flex justify-content-between align-items-center">
                                    <small class="text-muted" th:text="${a.time}"></small>
                                    <span th:if="${a.extra != null}" class="badge bg-danger" th:text="${a.extra}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="mockAnnounceModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/announcements/publish}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="modal-header">
                        <h5 class="modal-title">新建公告（模拟）</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">标题</label>
                            <input type="text" class="form-control" value="平台活动通知" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">内容</label>
                            <textarea class="form-control" rows="3" readonly>此为演示功能，点击发布仅提示成功，不写入数据库。</textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">模拟发布</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
