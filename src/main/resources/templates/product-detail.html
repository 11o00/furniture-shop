<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - 家具商城'">商品详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}">首页</a></li>
                <li class="breadcrumb-item"><a th:href="@{/products}">商品列表</a></li>
                <li class="breadcrumb-item active" th:text="${product.name}"></li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="card-body p-2">
                        <div th:replace="~{fragments/product-image :: detail(product=${product})}"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h2 class="fw-bold mb-3" th:text="${product.name}"></h2>
                        <p class="text-danger fs-3 fw-bold mb-4" th:text="'¥' + ${product.price}"></p>
                        
                        <div class="mb-3">
                            <span class="text-muted">销量：</span>
                            <span th:text="${product.sales}"></span>
                        </div>
                        <div class="mb-3">
                            <span class="text-muted">库存：</span>
                            <span th:text="${product.stock}"></span>
                        </div>
                        <div class="mb-3" th:if="${product.material != null}">
                            <span class="text-muted">材质：</span>
                            <span th:text="${product.material}"></span>
                        </div>
                        <div class="mb-3" th:if="${product.size != null}">
                            <span class="text-muted">尺寸：</span>
                            <span th:text="${product.size}"></span>
                        </div>
                        <div class="mb-3" th:if="${product.style != null}">
                            <span class="text-muted">风格：</span>
                            <span th:text="${product.style}"></span>
                        </div>
                        <div class="mb-4" th:if="${product.brand != null}">
                            <span class="text-muted">品牌：</span>
                            <span th:text="${product.brand}"></span>
                        </div>
                        
                        <p class="text-muted mb-4" th:text="${product.description}"></p>
                        
                        <div th:if="${currentUser != null}">
                            <div class="input-group mb-3" style="max-width: 150px;">
                                <span class="input-group-text">数量</span>
                                <input type="number" id="quantity" class="form-control" value="1" min="1" th:max="${product.stock}">
                            </div>
                            
                            <div class="d-flex gap-2">
                                <form th:action="@{/cart/add}" method="post" class="flex-grow-1">
                                    <input type="hidden" name="productId" th:value="${product.id}">
                                    <input type="hidden" name="quantity" id="cartQuantity" value="1">
                                    <button type="submit" class="btn btn-outline-primary w-100 btn-lg">
                                        <i class="bi bi-cart"></i> 加入购物车
                                    </button>
                                </form>
                                <a th:href="@{/cart}" class="btn btn-primary btn-lg flex-grow-1">立即购买</a>
                            </div>
                            
                            <form th:action="@{/profile/favorites/add}" method="post" class="mt-3">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="bi bi-heart"></i> 加入收藏
                                </button>
                            </form>
                        </div>
                        <div th:if="${currentUser == null}">
                            <a th:href="@{/login}" class="btn btn-primary btn-lg w-100">登录后购买</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-5">
            <div class="card-header bg-white">
                <h5 class="fw-bold mb-0">商品评价</h5>
            </div>
            <div class="card-body">
                <div th:if="${currentUser != null}" class="mb-4 p-4 bg-light rounded">
                    <h6>发表评价</h6>
                    <form th:action="@{/products/{id}/review(id=${product.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">评分</label>
                            <div class="d-flex gap-2">
                                <span class="form-check">
                                    <input class="form-check-input" type="radio" name="rating" value="5" id="r5" checked>
                                    <label class="form-check-label" for="r5">5星</label>
                                </span>
                                <span class="form-check">
                                    <input class="form-check-input" type="radio" name="rating" value="4" id="r4">
                                    <label class="form-check-label" for="r4">4星</label>
                                </span>
                                <span class="form-check">
                                    <input class="form-check-input" type="radio" name="rating" value="3" id="r3">
                                    <label class="form-check-label" for="r3">3星</label>
                                </span>
                                <span class="form-check">
                                    <input class="form-check-input" type="radio" name="rating" value="2" id="r2">
                                    <label class="form-check-label" for="r2">2星</label>
                                </span>
                                <span class="form-check">
                                    <input class="form-check-input" type="radio" name="rating" value="1" id="r1">
                                    <label class="form-check-label" for="r1">1星</label>
                                </span>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">评价内容</label>
                            <textarea class="form-control" name="comment" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">提交评价</button>
                    </form>
                </div>
                
                <div th:if="${reviews.isEmpty()}">
                    <p class="text-muted text-center py-4">暂无评价</p>
                </div>
                
                <div class="list-group list-group-flush" th:if="${!reviews.isEmpty()}">
                    <div class="list-group-item px-0" th:each="review : ${reviews}">
                        <div class="d-flex align-items-center mb-2">
                            <i class="bi bi-person-circle text-muted fs-3 me-2"></i>
                            <div>
                                <strong th:text="${review.user.username}"></strong>
                                <div class="text-warning">
                                    <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, review.rating)}"></i>
                                </div>
                            </div>
                            <small class="text-muted ms-auto" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                        </div>
                        <p class="mb-0" th:text="${review.comment}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('quantity').addEventListener('change', function() {
            document.getElementById('cartQuantity').value = this.value;
        });
    </script>
</body>
</html>
