<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .register-card {
            width: 100%;
            max-width: 450px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="card register-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-house-door text-primary display-1"></i>
                    <h3 class="fw-bold mt-2">家具商城</h3>
                    <p class="text-muted">创建您的账号</p>
                </div>
                
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                
                <form th:action="@{/register}" method="post" th:object="${user}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" th:field="*{username}" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" th:field="*{password}" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" th:field="*{email}" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-phone"></i></span>
                            <input type="text" th:field="*{phone}" class="form-control">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">注册身份</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="role" value="BUYER" id="buyer" checked>
                            <label class="form-check-label" for="buyer">买家</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="role" value="SELLER" id="seller">
                            <label class="form-check-label" for="seller">卖家</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">注册</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="mb-0">已有账号？
                        <a th:href="@{/login}" class="text-decoration-none">立即登录</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
