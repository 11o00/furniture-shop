<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
    <div th:fragment="header" class="bg-white shadow-sm">
        <nav class="container navbar navbar-expand-lg navbar-light">
            <a class="navbar-brand fw-bold text-primary" th:href="@{/}">
                <i class="bi bi-house-door"></i> 家具商城
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/products}">商品</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <div th:if="${currentUser == null}">
                        <a class="nav-link" th:href="@{/login}">登录</a>
                        <a class="nav-link" th:href="@{/register}">注册</a>
                    </div>
                    <div th:if="${currentUser != null}" class="d-flex align-items-center">
                        <a class="nav-link" th:href="@{/cart}">
                            <i class="bi bi-cart"></i> 购物车
                        </a>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle"></i>
                                <span th:text="${currentUser.username}"></span>
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" th:href="@{/profile}">个人中心</a></li>
                                <li><a class="dropdown-item" th:href="@{/order/my-orders}">我的订单</a></li>
                                <li th:if="${currentUser.role.name() == 'ROLE_SELLER'}">
                                    <a class="dropdown-item" th:href="@{/seller}">卖家中心</a>
                                </li>
                                <li th:if="${currentUser.role.name() == 'ROLE_ADMIN'}">
                                    <a class="dropdown-item" th:href="@{/admin}">管理后台</a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form th:action="@{/logout}" method="post" class="d-inline">
                                        <button type="submit" class="dropdown-item">退出登录</button>
                                    </form>
                                </li>
                            </ul>
                        </li>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</body>
</html>
