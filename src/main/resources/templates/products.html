<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .filter-card {
            position: sticky;
            top: 20px;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-3">
                <div class="card filter-card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4">筛选条件</h5>
                        
                        <form th:action="@{/products}" method="get" id="filterForm">
                            <div class="mb-4">
                                <h6>分类</h6>
                                <div class="form-check" th:each="category : ${categories}">
                                    <input class="form-check-input" type="radio" name="categoryId" 
                                           th:id="${'cat' + category.id}" 
                                           th:value="${category.id}"
                                           th:checked="${categoryId != null and categoryId == category.id}">
                                    <label class="form-check-label" th:for="${'cat' + category.id}" th:text="${category.name}"></label>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <h6>价格区间</h6>
                                <div class="row g-2">
                                    <div class="col">
                                        <input type="number" name="minPrice" class="form-control" placeholder="最低价" th:value="${minPrice}">
                                    </div>
                                    <div class="col">
                                        <input type="number" name="maxPrice" class="form-control" placeholder="最高价" th:value="${maxPrice}">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <h6>排序方式</h6>
                                <select name="sortBy" class="form-select" onchange="document.getElementById('filterForm').submit()">
                                    <option value="createdAt" th:selected="${sortBy == 'createdAt'}">上架时间</option>
                                    <option value="price" th:selected="${sortBy == 'price'}">价格</option>
                                    <option value="sales" th:selected="${sortBy == 'sales'}">销量</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">应用筛选</button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary w-100 mt-2">重置</a>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>商品列表</h4>
                    <div class="input-group" style="max-width: 300px;">
                        <form th:action="@{/products}" method="get" class="d-flex">
                            <input type="text" name="keyword" class="form-control" placeholder="搜索商品..." th:value="${keyword}">
                            <button class="btn btn-primary" type="submit">
                                <i class="bi bi-search"></i>
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="row g-4" th:if="${!products.isEmpty()}">
                    <div class="col-md-4 col-6" th:each="product : ${products}">
                        <div class="card product-card h-100">
                            <div th:replace="~{fragments/product-image :: card(product=${product})}"></div>
                            <div class="card-body">
                                <h6 class="card-title text-truncate" th:text="${product.name}"></h6>
                                <p class="text-danger fw-bold mb-1" th:text="'¥' + ${product.price}"></p>
                                <p class="text-muted small mb-0">
                                    <span th:text="${product.sales}"></span> 人已付款
                                </p>
                            </div>
                            <div class="card-footer bg-white border-top-0">
                                <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-primary w-100">查看详情</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center py-5" th:if="${products.isEmpty()}">
                    <i class="bi bi-box-seam display-1 text-muted"></i>
                    <p class="mt-3 text-muted">暂无商品</p>
                </div>
                
                <nav th:if="${totalPages > 1}" class="mt-5">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:class="${currentPage == 0} ? 'page-item disabled' : 'page-item'">
                            <a class="page-link" th:href="@{/products(categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice}, keyword=${keyword}, page=${currentPage - 1}, sortBy=${sortBy}, sortDir=${sortDir})}">上一页</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:class="${i == currentPage} ? 'page-item active' : 'page-item'">
                            <a class="page-link" th:href="@{/products(categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice}, keyword=${keyword}, page=${i}, sortBy=${sortBy}, sortDir=${sortDir})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:class="${currentPage == totalPages - 1} ? 'page-item disabled' : 'page-item'">
                            <a class="page-link" th:href="@{/products(categoryId=${categoryId}, minPrice=${minPrice}, maxPrice=${maxPrice}, keyword=${keyword}, page=${currentPage + 1}, sortBy=${sortBy}, sortDir=${sortDir})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
