<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('settings')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header mb-4"><h4 class="mb-0">系统设置</h4></div>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="@{/admin/settings}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">站点名称</label>
                                    <input type="text" name="siteName" class="form-control" th:value="${settings.siteName}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">站点标语</label>
                                    <input type="text" name="siteSlogan" class="form-control" th:value="${settings.siteSlogan}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">客服电话</label>
                                    <input type="text" name="contactPhone" class="form-control" th:value="${settings.contactPhone}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">客服邮箱</label>
                                    <input type="email" name="contactEmail" class="form-control" th:value="${settings.contactEmail}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">未付款订单自动取消（分钟）</label>
                                    <input type="number" name="orderAutoCancelMinutes" class="form-control" th:value="${settings.orderAutoCancelMinutes}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">低库存预警阈值</label>
                                    <input type="number" name="lowStockThreshold" class="form-control" th:value="${settings.lowStockThreshold}">
                                </div>
                                <div class="col-12">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="maintenanceMode" disabled>
                                        <label class="form-check-label" for="maintenanceMode">维护模式（演示项，未启用）</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg me-1"></i>保存设置（模拟）</button>
                                <span class="text-muted small ms-2">保存后仅提示成功，不写入数据库</span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
