<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 管理后台'">管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div th:fragment="page(active, title, content)">
        <div th:replace="~{fragments/header :: header}"></div>
        <div class="container-fluid admin-page py-4">
            <div class="row g-4">
                <div th:replace="~{fragments/admin-sidebar :: sidebar(${active})}"></div>
                <div class="col-lg-9 col-xl-10 admin-main">
                    <div class="admin-page-header mb-4">
                        <h4 class="mb-0" th:text="${title}"></h4>
                    </div>
                    <div th:replace="${content}"></div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/footer :: footer}"></div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
