<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .sidebar-menu {
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
        }
        
        .sidebar-menu .list-group-item {
            border: none;
            padding: 12px 16px;
            transition: all 0.2s ease;
            border-radius: 8px !important;
            margin: 4px 8px;
        }
        
        .sidebar-menu .list-group-item:hover {
            background-color: #f0f1f5;
        }
        
        .sidebar-menu .list-group-item.active {
            background-color: #667eea;
            color: white;
        }
        
        .content-card {
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
            border: none;
        }
        
        .btn-primary {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        .btn-primary:hover {
            background-color: #5568d3;
            border-color: #5568d3;
        }
        
        @media (max-width: 768px) {
            .sidebar-menu {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container py-5">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-lg-3 mb-4">
                <div class="sidebar-menu bg-white">
                    <div class="p-4 border-b border-gray-100">
                        <h5 class="font-medium"><i class="bi bi-user-circle text-primary me-2"></i>个人中心</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a th:href="@{/profile}" class="list-group-item list-group-item-action active">
                            <i class="bi bi-info-circle me-2"></i>个人信息
                        </a>
                        <a th:href="@{/profile/addresses}" class="list-group-item list-group-item-action">
                            <i class="bi bi-map-pin me-2"></i>收货地址
                        </a>
                        <a th:href="@{/profile/favorites}" class="list-group-item list-group-item-action">
                            <i class="bi bi-heart me-2"></i>我的收藏
                        </a>
                        <a th:href="@{/profile/reviews}" class="list-group-item list-group-item-action">
                            <i class="bi bi-star me-2"></i>我的评价
                        </a>
                        <a th:href="@{/order/my-orders}" class="list-group-item list-group-item-action">
                            <i class="bi bi-receipt me-2"></i>我的订单
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- 主内容区 -->
            <div class="col-lg-9">
                <div class="content-card bg-white">
                    <div class="p-4 border-b border-gray-100">
                        <h5 class="font-medium"><i class="bi bi-info-circle text-primary me-2"></i>个人信息</h5>
                    </div>
                    <div class="p-4">
                        <form th:action="@{/profile/update}" method="post" th:object="${currentUser}">
                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-muted">用户名</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control bg-gray-50" th:value="${currentUser.username}" disabled>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-muted">邮箱</label>
                                <div class="col-sm-9">
                                    <input type="email" name="email" class="form-control" th:value="${currentUser.email}" placeholder="请输入邮箱">
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-muted">手机号</label>
                                <div class="col-sm-9">
                                    <input type="text" name="phone" class="form-control" th:value="${currentUser.phone}" placeholder="请输入手机号">
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-muted">角色</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control bg-gray-50" 
                                           th:value="${currentUser.role.name() == 'ROLE_BUYER' ? '买家' : (currentUser.role.name() == 'ROLE_SELLER' ? '卖家' : '管理员')}" 
                                           disabled>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-sm-9 offset-sm-3">
                                    <button type="submit" class="btn btn-primary px-6">
                                        <i class="bi bi-save me-1"></i>保存修改
                                    </button>
                                </div>
                            </div>
                        </form>
                        
                        <hr class="my-6">
                        
                        <h5 class="font-medium mb-4"><i class="bi bi-key text-primary me-2"></i>修改密码</h5>
                        <form th:action="@{/profile/change-password}" method="post">
                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-muted">原密码</label>
                                <div class="col-sm-9">
                                    <input type="password" name="oldPassword" class="form-control" placeholder="请输入原密码" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-muted">新密码</label>
                                <div class="col-sm-9">
                                    <input type="password" name="newPassword" class="form-control" placeholder="请输入新密码" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-sm-9 offset-sm-3">
                                    <button type="submit" class="btn btn-outline-primary px-6">
                                        <i class="bi bi-lock me-1"></i>修改密码
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
