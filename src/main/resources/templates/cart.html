<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 家具商城</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #1a73e8;
            --primary-hover: #1557b0;
            --danger-color: #ea4335;
            --danger-hover: #c23321;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .cart-wrapper {
            min-height: calc(100vh - 200px);
            padding: 48px 0;
        }

        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color), #4285f4);
            border-radius: var(--radius-lg);
            color: white;
            font-size: 20px;
            box-shadow: var(--shadow-md);
        }

        .cart-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .cart-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .cart-header-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .select-all-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .select-all-wrapper:hover {
            color: var(--primary-color);
        }

        .select-all-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .select-all-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .delete-selected-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--danger-color);
            background: transparent;
            border: 1px solid var(--danger-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-selected-btn:hover {
            background: rgba(234, 67, 53, 0.08);
            border-color: var(--danger-hover);
            color: var(--danger-hover);
        }

        .cart-content {
            display: flex;
            gap: 24px;
        }

        .cart-items {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cart-item-card {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .cart-item-card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--border-color);
        }

        .cart-item-card:focus-within {
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-color);
        }

        .cart-item-inner {
            display: flex;
            gap: 20px;
        }

        .item-checkbox {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .item-image-wrapper {
            flex-shrink: 0;
            width: 140px;
            height: 140px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-secondary);
            position: relative;
        }

        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cart-item-card:hover .item-image {
            transform: scale(1.05);
        }

        .item-image-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 32px;
        }

        .item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s ease;
            line-height: 1.4;
        }

        .item-name:hover {
            color: var(--primary-color);
        }

        .remove-btn {
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(234, 67, 53, 0.08);
            border-radius: var(--radius-md);
            color: var(--danger-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cart-item-card:hover .remove-btn {
            opacity: 1;
        }

        .remove-btn:hover {
            background: rgba(234, 67, 53, 0.15);
            color: var(--danger-hover);
        }

        .item-specs {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .spec-tag {
            padding: 4px 10px;
            background: var(--bg-secondary);
            border-radius: 20px;
            font-size: 12px;
        }

        .item-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .item-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--danger-color);
            letter-spacing: -0.5px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 4px;
        }

        .qty-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .qty-btn:hover {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .qty-btn:active {
            transform: scale(0.95);
        }

        .qty-input {
            width: 50px;
            height: 36px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            outline: none;
        }

        .item-subtotal {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-left: 16px;
        }

        .cart-summary {
            width: 360px;
            flex-shrink: 0;
            position: sticky;
            top: 24px;
        }

        .summary-card {
            background: var(--bg-primary);
            border-radius: var(--radius-xl);
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .summary-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .summary-label {
            color: var(--text-secondary);
        }

        .summary-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .summary-divider {
            height: 1px;
            background: var(--border-color);
            margin: 16px 0;
        }

        .summary-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .summary-total-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .summary-total-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--danger-color);
            letter-spacing: -0.5px;
        }

        .checkout-btn {
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary-color), #4285f4);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .checkout-btn:active {
            transform: translateY(0);
        }

        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }

        .empty-icon {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 50%;
            margin-bottom: 24px;
        }

        .empty-icon i {
            font-size: 60px;
            color: var(--text-muted);
        }

        .empty-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .empty-action {
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary-color), #4285f4);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .empty-action:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .selected-count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            background: var(--danger-color);
            color: white;
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px;
            margin-left: 4px;
        }

        @media (max-width: 900px) {
            .cart-content {
                flex-direction: column;
            }

            .cart-summary {
                width: 100%;
            }

            .cart-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .cart-header-actions {
                width: 100%;
                justify-content: space-between;
            }

            .item-image-wrapper {
                width: 100px;
                height: 100px;
            }

            .item-footer {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .item-subtotal {
                margin-left: 0;
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="cart-wrapper">
        <div class="cart-container">
            <div class="cart-header">
                <div class="cart-header-left">
                    <div class="cart-icon">
                        <i class="bi bi-cart"></i>
                    </div>
                    <div>
                        <h1 class="cart-title">购物车</h1>
                        <p class="cart-count" th:text="'共 ' + ${cartItems.size()} + ' 件商品'"></p>
                    </div>
                </div>
                <div th:if="${!cartItems.isEmpty()}" class="cart-header-actions">
                    <label class="select-all-wrapper">
                        <input type="checkbox" id="selectAll" class="select-all-checkbox">
                        <span class="select-all-text">全选</span>
                    </label>
                    <button id="deleteSelected" class="delete-selected-btn">
                        <i class="bi bi-trash"></i>
                        删除选中
                        <span id="selectedCountBadge" class="selected-count-badge" style="display: none;">0</span>
                    </button>
                </div>
            </div>

            <div th:if="${cartItems.isEmpty()}" class="empty-cart">
                <div class="empty-icon">
                    <i class="bi bi-shopping-cart"></i>
                </div>
                <h2 class="empty-title">购物车还是空的</h2>
                <p class="empty-desc">快去挑选心仪的家具吧</p>
                <a th:href="@{/products}" class="empty-action">
                    <i class="bi bi-arrow-right"></i>
                    去购物
                </a>
            </div>

            <div th:if="${!cartItems.isEmpty()}" class="cart-content">
                <div class="cart-items">
                    <div th:each="item : ${cartItems}" class="cart-item-card">
                        <div class="cart-item-inner">
                            <input type="checkbox" class="item-checkbox" th:data-cart-id="${item.id}">
                            
                            <div class="item-image-wrapper">
                                <img th:src="${item.product.imageUrl}" 
                                     th:alt="${item.product.name}" 
                                     class="item-image"
                                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                <div class="item-image-placeholder" style="display: none;">
                                    <i class="bi bi-image"></i>
                                </div>
                            </div>
                            
                            <div class="item-details">
                                <div class="item-header">
                                    <a th:href="@{/products/{id}(id=${item.product.id})}" 
                                       class="item-name"
                                       th:text="${item.product.name}"></a>
                                    <form th:action="@{/cart/remove}" method="post" class="remove-form">
                                        <input type="hidden" name="cartId" th:value="${item.id}">
                                        <button type="submit" class="remove-btn" title="删除商品">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </form>
                                </div>
                                
                                <div class="item-specs">
                                    <span class="spec-tag" th:text="${item.product.material}"></span>
                                    <span class="spec-tag" th:text="${item.product.size}"></span>
                                    <span class="spec-tag" th:text="${item.product.style}"></span>
                                </div>
                                
                                <div class="item-footer">
                                    <div class="item-price" th:text="'¥' + ${item.product.price}"></div>
                                    <div class="d-flex align-items-center">
                                        <div class="quantity-control">
                                            <button class="qty-btn" onclick="updateQuantity(this, -1)">
                                                <i class="bi bi-minus"></i>
                                            </button>
                                            <input type="number" class="qty-input" 
                                                   th:value="${item.quantity}" min="1"
                                                   th:data-cart-id="${item.id}"
                                                   onchange="updateQuantityInput(this)">
                                            <button class="qty-btn" onclick="updateQuantity(this, 1)">
                                                <i class="bi bi-plus"></i>
                                            </button>
                                        </div>
                                        <div class="item-subtotal" th:text="'¥' + ${item.product.price * item.quantity}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="summary-card">
                        <h3 class="summary-title">订单汇总</h3>
                        
                        <div class="summary-row">
                            <span class="summary-label">商品数量</span>
                            <span class="summary-value" th:text="${cartItems.size()} + ' 件'"></span>
                        </div>
                        
                        <div class="summary-row">
                            <span class="summary-label">运费</span>
                            <span class="summary-value">免运费</span>
                        </div>
                        
                        <div class="summary-divider"></div>
                        
                        <div class="summary-total-row">
                            <span class="summary-total-label">应付金额</span>
                            <span class="summary-total-value" th:text="'¥' + ${total}"></span>
                        </div>
                        
                        <a th:href="@{/order/checkout}" class="checkout-btn">
                            <span>去结算</span>
                            <i class="bi bi-arrow-right"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.item-checkbox');
            const deleteSelected = document.getElementById('deleteSelected');
            const selectedCountBadge = document.getElementById('selectedCountBadge');

            function updateSelectedCount() {
                const count = document.querySelectorAll('.item-checkbox:checked').length;
                selectedCountBadge.textContent = count;
                selectedCountBadge.style.display = count > 0 ? 'inline-flex' : 'none';
                selectAll.checked = checkboxes.length > 0 && checkboxes.length === count;
            }

            selectAll.addEventListener('change', function() {
                checkboxes.forEach(cb => cb.checked = selectAll.checked);
                updateSelectedCount();
            });

            checkboxes.forEach(cb => {
                cb.addEventListener('change', updateSelectedCount);
            });

            deleteSelected.addEventListener('click', function() {
                const checkedBoxes = document.querySelectorAll('.item-checkbox:checked');
                if (checkedBoxes.length === 0) {
                    showToast('请先选择要删除的商品');
                    return;
                }

                if (confirm(`确定要删除选中的 ${checkedBoxes.length} 件商品吗？`)) {
                    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';
                    checkedBoxes.forEach(cb => {
                        const cartId = cb.dataset.cartId;
                        fetch('/cart/remove', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/x-www-form-urlencoded',
                                'X-CSRF-TOKEN': csrfToken
                            },
                            body: `cartId=${cartId}`
                        }).then(() => {
                            window.location.reload();
                        });
                    });
                }
            });
        });

        function updateQuantity(btn, delta) {
            const input = btn.parentElement.querySelector('.qty-input');
            const currentValue = parseInt(input.value);
            const newValue = currentValue + delta;
            
            if (newValue >= 1) {
                input.value = newValue;
                submitQuantityUpdate(input);
            }
        }

        function updateQuantityInput(input) {
            const value = parseInt(input.value);
            if (isNaN(value) || value < 1) {
                input.value = 1;
            }
            submitQuantityUpdate(input);
        }

        function submitQuantityUpdate(input) {
            const cartId = input.dataset.cartId;
            const quantity = input.value;
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.content || '';

            fetch('/cart/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRF-TOKEN': csrfToken
                },
                body: `cartId=${cartId}&quantity=${quantity}`
            }).then(() => {
                window.location.reload();
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                border-radius: 8px;
                font-size: 14px;
                z-index: 1000;
                animation: fadeIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        const styleSheet = document.createElement('style');
        styleSheet.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
                to { opacity: 1; transform: translateX(-50%) translateY(0); }
            }
            @keyframes fadeOut {
                from { opacity: 1; transform: translateX(-50%) translateY(0); }
                to { opacity: 0; transform: translateX(-50%) translateY(-10px); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
