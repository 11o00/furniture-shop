<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价管理 - 管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/header :: header}"></div>
    <div class="container-fluid admin-page py-4">
        <div class="row g-4">
            <div th:replace="~{fragments/admin-sidebar :: sidebar('reviews')}"></div>
            <div class="col-lg-9 col-xl-10 admin-main">
                <div class="admin-page-header d-flex justify-content-between align-items-center mb-4">
                    <h4 class="mb-0">评价管理</h4>
                    <span class="badge bg-secondary admin-mock-badge">模拟数据</span>
                </div>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>用户</th>
                                        <th>商品</th>
                                        <th>评分</th>
                                        <th>内容</th>
                                        <th>状态</th>
                                        <th>时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="r : ${reviews}">
                                        <td th:text="${r.id}"></td>
                                        <td th:text="${r.title}"></td>
                                        <td th:text="${r.subtitle}"></td>
                                        <td>
                                            <span class="text-warning" th:each="i : ${#numbers.sequence(1, r.rating)}">★</span>
                                        </td>
                                        <td><small th:text="${r.content}"></small></td>
                                        <td><span class="badge" th:classappend="${r.badgeClass}" th:text="${r.statusLabel}"></span></td>
                                        <td><small th:text="${r.time}"></small></td>
                                        <td class="text-nowrap">
                                            <form th:action="@{/admin/reviews/{id}/approve(id=${r.id})}" method="post" class="d-inline">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-sm btn-outline-success">通过</button>
                                            </form>
                                            <form th:action="@{/admin/reviews/{id}/hide(id=${r.id})}" method="post" class="d-inline">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-sm btn-outline-secondary">隐藏</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
